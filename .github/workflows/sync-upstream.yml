name: Sync LibreTV Upstream
on:
  schedule:
    - cron: '0 12 * * *'  # 每天 UTC 时间 12:00 (北京时间 20:00)
  workflow_dispatch:       # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # 授予写入权限
    
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          ref: main        # 使用 main 分支而不是 master

      - name: Sync LibreSpark/LibreTV
        uses: upstream-sync/sync-upstream-action@v1
        with:
          upstream_repo: LibreSpark/LibreTV
          target_branch: main      # 目标分支改为 main
          github_token: ${{ secrets.GITHUB_TOKEN }}
